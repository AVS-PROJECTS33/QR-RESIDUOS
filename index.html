<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LASER PANIC</title>
    <style>
        /* --- ESTILOS GENERALES --- */
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-touch-callout: none; }
        body {
            background-color: #020617;
            color: #f8fafc;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            touch-action: none;
        }

        #game-container {
            position: relative;
            width: 100%;
            max-width: 600px;
            padding: 5px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- CABECERA ESTADÍSTICAS --- */
        .header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            padding: 0 5px;
        }

        .stat-box {
            background: rgba(0, 0, 0, 0.7);
            padding: 6px 12px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            white-space: nowrap;
            font-weight: bold;
            font-size: 0.9rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .score { color: #38bdf8; }
        .lives { color: #fb7185; }
        .world-info { 
            font-size: 1rem; 
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .pause-btn { 
            cursor: pointer; background: #38bdf8; color: #020617; 
            font-weight: 900; padding: 4px 14px; border-radius: 6px;
        }

        /* --- HUD PODERES --- */
        #active-powers-hud {
            width: 100%;
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            min-height: 30px;
            margin-bottom: 5px;
        }

        .power-bar-container {
            flex: 1;
            min-width: 90px;
            background: rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 4px;
            position: relative;
            height: 22px;
            overflow: hidden;
            display: flex;
            align-items: center;
        }

        .power-bar-fill {
            position: absolute;
            top: 0; left: 0; height: 100%;
            width: 100%;
            transform-origin: left;
            transition: transform 0.1s linear;
        }

        .power-bar-text {
            position: relative;
            z-index: 2;
            width: 100%;
            text-align: center;
            font-size: 0.65rem;
            font-weight: bold;
            color: white;
            text-shadow: 1px 1px 2px black;
        }

        /* --- LIENZO --- */
        #canvas-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 3 / 4;
            max-height: 70vh;
            background: #000;
            border: 2px solid #1e293b;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.9);
            overflow: hidden;
        }

        canvas { display: block; width: 100%; height: 100%; cursor: none; }

        /* --- OVERLAYS --- */
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(2, 6, 23, 0.92);
            backdrop-filter: blur(6px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 100;
            padding: 20px;
        }
        .overlay.active { opacity: 1; pointer-events: all; }

        .btn {
            background: #38bdf8; color: #0f172a; border: none;
            padding: 14px 28px; font-size: 1.1rem; font-weight: 800;
            border-radius: 8px; cursor: pointer; margin-top: 12px;
            width: 100%; max-width: 260px; text-transform: uppercase;
            box-shadow: 0 4px 0 #0284c7; transition: all 0.1s;
        }
        .btn:active { transform: translateY(4px); box-shadow: 0 0 0 #0284c7; }
        .btn-secondary { background: #475569; color: white; box-shadow: 0 4px 0 #1e293b; }

        .leaderboard {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 15px;
            width: 100%;
            max-width: 350px;
            margin: 15px 0;
        }
        .leaderboard-list { list-style: none; padding: 0; }
        .leaderboard-list li {
            display: flex; justify-content: space-between;
            padding: 8px 0; font-size: 1rem; border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .leaderboard-list li span:last-child { font-weight: bold; color: #38bdf8; }
        .current-user { color: #fcd34d !important; font-weight: bold; }

        #level-select-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            max-height: 50vh;
            overflow-y: auto;
            width: 100%;
            padding: 10px;
        }
        .lvl-box {
            background: #1e293b; border: 1px solid #38bdf8; padding: 12px 0;
            border-radius: 6px; cursor: pointer; font-weight: bold;
        }
        .lvl-box.locked { opacity: 0.3; cursor: not-allowed; border-color: #475569; }

        .name-input {
            width: 100%; max-width: 200px; padding: 12px; font-size: 1.2rem;
            text-align: center; border-radius: 8px; border: 2px solid #334155;
            background: #0f172a; color: white; outline: none; margin: 10px 0;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div class="header">
            <div class="stat-box pause-btn" id="btn-pause">☰</div>
            <div class="stat-box score">PTS: <span id="ui-score">0</span></div>
            <div class="stat-box world-info" id="ui-world-level">MUNDO 1 - NIVEL 1</div>
            <div class="stat-box lives">❤️ <span id="ui-lives">3</span></div>
        </div>

        <div id="active-powers-hud"></div>

        <div id="canvas-wrapper">
            <canvas id="gameCanvas"></canvas>

            <!-- Pantalla Inicio -->
            <div id="screen-start" class="overlay active">
                <h1 style="font-size: 3rem; color: #38bdf8; text-shadow: 0 0 20px #0ea5e9;">LASER PANIC</h1>
                <p id="ui-saved-info" style="margin-bottom: 20px;">Cargando...</p>
                <button class="btn" id="btn-play">Jugar / Continuar</button>
                <button class="btn btn-secondary" id="btn-open-levels">Elegir Nivel</button>
                <button class="btn btn-secondary" id="btn-open-ranking">Ranking Mundial</button>
            </div>

            <!-- Pantalla Ranking -->
            <div id="screen-ranking" class="overlay">
                <h2 style="color: #fcd34d;">Top 10 Global 🌎</h2>
                <div class="leaderboard">
                    <ul id="list-ranking" class="leaderboard-list">
                        <p style="color: #94a3b8;">Sincronizando...</p>
                    </ul>
                </div>
                <button class="btn btn-secondary" id="btn-close-ranking">Volver</button>
            </div>

            <!-- Pantalla Selector -->
            <div id="screen-levels" class="overlay">
                <h2>Selecciona Nivel</h2>
                <div id="level-select-grid"></div>
                <button class="btn btn-secondary" id="btn-close-levels" style="margin-top: 20px;">Volver</button>
            </div>

            <!-- Pantalla Game Over -->
            <div id="screen-gameover" class="overlay">
                <h2 style="color: #fb7185;">FIN DEL JUEGO</h2>
                <p>Puntuación: <span id="ui-final-score" style="color: #fcd34d;">0</span></p>
                
                <div id="save-area" style="display: none; flex-direction: column; align-items: center; width: 100%;">
                    <p style="font-size: 0.8rem; margin-top: 10px;">¡Récord detectado! Introduce tu Alias:</p>
                    <input type="text" id="input-alias" class="name-input" maxlength="10" placeholder="ANÓNIMO">
                    <button class="btn" id="btn-submit-score" style="font-size: 0.9rem; padding: 10px;">Guardar en Ranking</button>
                </div>

                <button class="btn" id="btn-retry" style="margin-top: 20px;">Reintentar Nivel</button>
                <button class="btn btn-secondary" id="btn-to-menu">Menú Principal</button>
            </div>

            <!-- Pantalla Pausa -->
            <div id="screen-pause" class="overlay">
                <h2>PAUSA</h2>
                <button class="btn" id="btn-resume">Reanudar</button>
                <button class="btn btn-secondary" id="btn-quit">Salir al Menú</button>
            </div>

            <!-- Pantalla Victoria -->
            <div id="screen-victory" class="overlay">
                <h2 style="color: #34d399;">¡NIVEL SUPERADO!</h2>
                <button class="btn" id="btn-next">Siguiente Nivel</button>
            </div>
            
            <div id="game-beaten-screen" class="overlay">
                <h2>¡ERES UNA LEYENDA!</h2>
                <p>Has completado los 100 niveles.</p>
                <button class="btn" onclick="location.reload()">Reiniciar Todo</button>
            </div>
        </div>
    </div>

    <script type="module">
        // --- FIREBASE INTEGRATION ---
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, limit } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB-wS6DH6G-hF5eGvSFULIgX_gj7WE8WhI",
            authDomain: "laser-panic.firebaseapp.com",
            projectId: "laser-panic",
            storageBucket: "laser-panic.firebasestorage.app",
            messagingSenderId: "875382695348",
            appId: "1:875382695348:web:ddd0691bf877c00848fee1",
            measurementId: "G-HL25VP4G8N"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'laser-panic';
        let user = null;
        let globalScores = [];

        // Auth & Ranking Listener
        signInAnonymously(auth).catch(e => console.error("Firebase Auth Error", e));
        onAuthStateChanged(auth, (u) => {
            user = u;
            if (user) {
                const q = collection(db, 'artifacts', appId, 'public', 'data', 'leaderboard');
                onSnapshot(q, (snapshot) => {
                    let raw = [];
                    snapshot.forEach(doc => raw.push(doc.data()));
                    raw.sort((a, b) => b.score - a.score);
                    globalScores = raw.slice(0, 10);
                    updateRankingUI();
                });
            }
        });

        // --- GAME ENGINE ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const GAME_WIDTH = 600;
        const GAME_HEIGHT = 800;

        function resize() {
            const dpr = window.devicePixelRatio || 1;
            canvas.width = GAME_WIDTH * dpr;
            canvas.height = GAME_HEIGHT * dpr;
            ctx.scale(dpr, dpr);
        }
        resize();
        window.addEventListener('resize', resize);

        // Mundos
        const worldThemes = [
            { name: "Espacio Profundo", grad: "#1e293b", star: "white", text: "#38bdf8" },
            { name: "Nebulosa Solar", grad: "#4c1d95", star: "#d8b4fe", text: "#d8b4fe" },
            { name: "Ciber Matriz", grad: "#064e3b", star: "#6ee7b7", text: "#6ee7b7" },
            { name: "Núcleo Volcánico", grad: "#7f1d1d", star: "#fca5a5", text: "#f87171" },
            { name: "Abismo Oceánico", grad: "#164e63", star: "#67e8f9", text: "#22d3ee" },
            { name: "Desierto Carmesí", grad: "#7c2d12", star: "#fdba74", text: "#fb923c" },
            { name: "Tundra Helada", grad: "#0c4a6e", star: "#bae6fd", text: "#7dd3fc" },
            { name: "Zona Tóxica", grad: "#3f6212", star: "#d9f99d", text: "#a3e635" },
            { name: "Galaxia Dorada", grad: "#713f12", star: "#fef08a", text: "#facc15" },
            { name: "El Vacío Final", grad: "#000000", star: "red", text: "#fca5a5" }
        ];

        // Estado
        let level = parseInt(localStorage.getItem('laserPanicLvl')) || 1;
        let maxLvl = parseInt(localStorage.getItem('laserPanicMax')) || 1;
        let score = 0, lastRenderedScore = -1, lives = 3, isPlaying = false, isExploding = false;
        let balls = [], bricks = [], drops = [], bullets = [], stars = [], particles = [];

        // OPTIMIZACIÓN: Las estrellas ahora tienen una 'fase' aleatoria fija para no usar Math.random() cada frame
        for(let i=0; i<80; i++) {
            stars.push({ 
                x: Math.random()*GAME_WIDTH, y: Math.random()*GAME_HEIGHT, 
                sp: Math.random()*1.5+0.5, sz: Math.random()*2+0.5,
                opacity: Math.random(), phase: Math.random() * Math.PI * 2
            });
        }

        const effects = {
            fire: { t:0, max:900, c:'#f97316', label:'🔥 FUEGO' },
            poison: { t:0, max:600, c:'#22c55e', label:'☠️ VENENO' },
            slow: { t:0, max:600, c:'#7dd3fc', label:'🐢 LENTO' },
            fast: { t:0, max:420, c:'#fef08a', label:'⚡ RÁPIDO' },
            expand: { t:0, max:900, c:'#34d399', label:'↔️ GRANDE' },
            shrink: { t:0, max:420, c:'#ef4444', label:'>< PEQUEÑO' },
            gun: { t:0, max:900, c:'#a855f7', label:'🔫 PISTOLAS' },
            magnet: { t:0, max:1500, c:'#f43f5e', label:'🧲 IMÁN' }
        };

        const paddle = { x:GAME_WIDTH/2 - 60, y:GAME_HEIGHT-40, w:120, h:18, dx:0 };

        function setupLevel() {
            bricks = [];
            const rows = Math.min(4 + Math.floor(level/8), 12);
            const cols = 9, pad = 6;
            const w = (GAME_WIDTH - (pad*(cols+1)))/cols, h = 28, offY = 80;
            
            for(let r=0; r<rows; r++) {
                bricks[r] = [];
                for(let c=0; c<cols; c++) {
                    if(r === 0 || Math.random() > 0.3) {
                        let hp = 1; if(Math.random()>0.5) hp = Math.floor(Math.random() * Math.min(Math.floor(level/10)+2, 9)) + 1;
                        let p = null; if(Math.random()>0.88) { let ks = Object.keys(effects); ks.push('life','life','life','life'); p = ks[Math.floor(Math.random()*ks.length)]; }
                        bricks[r].push({ x:pad+(c*(w+pad)), y:offY+(r*(h+pad)), w, h, hp, p, color:`hsl(${Math.random()*360}, 75%, 60%)`, poisoned:false });
                    } else bricks[r].push(null);
                }
            }
            balls = [{ x:0, y:0, r:10, dx:0, dy:0, attached:true, off:60, history:[] }];
            isExploding = false;
            particles = [];
            updateUI();
        }

        function update() {
            if(!isPlaying) return;
            // OPTIMIZACIÓN: Variables puras para acelerar
            const now = Date.now();
            
            ctx.fillStyle = '#020617';
            ctx.fillRect(0,0,GAME_WIDTH,GAME_HEIGHT);
            
            // Fondo Parallax - Sin Math.random() en el bucle
            let theme = worldThemes[Math.min(Math.floor((level-1)/10), 9)];
            stars.forEach(s => {
                s.y += s.sp; if(s.y > GAME_HEIGHT) s.y = 0;
                let currentOpacity = Math.max(0.1, Math.min(1, s.opacity + (Math.sin((now / 500 * s.speed) + s.phase) * 0.3)));
                ctx.fillStyle = `rgba(255,255,255, ${currentOpacity})`; 
                ctx.fillRect(s.x | 0, s.y | 0, (s.sz*2) | 0, (s.sz*2) | 0); // Renderizado entero veloz
            });

            // Dibujar Bloques
            let activeBricks = 0;
            bricks.forEach(row => row.forEach(b => {
                if(b && b.hp > 0) {
                    activeBricks++;
                    ctx.fillStyle = b.poisoned && (Math.floor(now/100)%2===0) ? '#4ade80' : b.color;
                    
                    // OPTIMIZACIÓN: Convertimos posiciones a enteros usando "| 0" para evitar el costoso antialiasing de subpíxeles
                    ctx.fillRect(b.x | 0, b.y | 0, b.w | 0, b.h | 0); 
                    ctx.fillStyle = 'rgba(255,255,255,0.2)'; 
                    ctx.fillRect((b.x+2) | 0, (b.y+2) | 0, (b.w-4) | 0, (b.h*0.4) | 0);
                    
                    ctx.fillStyle = 'white'; ctx.font = 'bold 14px Arial'; ctx.textAlign = 'center';
                    if(b.p) ctx.fillText('★', (b.x+b.w/2)|0, (b.y+b.h/2+6)|0); else if(b.hp>1) ctx.fillText(b.hp, (b.x+b.w/2)|0, (b.y+b.h/2+6)|0);
                    if(b.poisoned && Math.floor(now%1000) < 20) { b.hp -= 0.05; score += 1; }
                }
            }));

            // Dibujar Drops
            drops.forEach((d,i) => {
                d.y += 1.5; ctx.fillStyle = d.p === 'life' ? '#ec4899' : (effects[d.p]?.c || '#fff');
                ctx.fillRect(d.x | 0, d.y | 0, 35, 20); // Bloque sólido
                if(!isExploding && d.y < paddle.y+paddle.h && d.y+20 > paddle.y && d.x < paddle.x+paddle.w && d.x+35 > paddle.x) {
                    if(d.p==='life') { lives++; document.getElementById('ui-lives').innerText=lives; }
                    else if(d.p==='multiball') { for(let j=0; j<3; j++) balls.push({ x:paddle.x+paddle.w/2, y:paddle.y-15, r:10, dx:(Math.random()-0.5)*10, dy:-6, attached:false, history:[] }); }
                    else if(effects[d.p]) effects[d.p].t = effects[d.p].max;
                    drops.splice(i,1); score += 50;
                } else if(d.y > GAME_HEIGHT) drops.splice(i,1);
            });

            if(isExploding) {
                particles.forEach((p,i) => {
                    p.x+=p.vx; p.y+=p.vy; p.vy+=0.4; p.life-=0.02;
                    if(p.life<=0) particles.splice(i,1);
                    else { ctx.globalAlpha=p.life; ctx.fillStyle=p.c; ctx.fillRect(p.x | 0, p.y | 0, p.s | 0, p.s | 0); }
                });
                ctx.globalAlpha=1;
            } else {
                // Balas
                bullets.forEach((b,i) => {
                    b.y -= 10; ctx.fillStyle = '#fcd34d'; ctx.fillRect((b.x-2)|0, b.y|0, 4, 12);
                    if(b.y < 0) bullets.splice(i,1);
                    else bricks.forEach(row => row.forEach(br => {
                        if(br && br.hp>0 && b.x > br.x && b.x < br.x+br.w && b.y > br.y && b.y < br.y+br.h) {
                            br.hp--; score += 10; bullets.splice(i,1);
                            if(br.hp<=0 && br.p) drops.push({x:br.x+br.w/2-17, y:br.y, p:br.p});
                        }
                    }));
                });

                // Raqueta
                let targetW = effects.expand.t > 0 ? 200 : (effects.shrink.t > 0 ? 70 : 120);
                paddle.w += (targetW - paddle.w) * 0.1;
                paddle.x += paddle.dx; if(paddle.x < 0) paddle.x = 0; if(paddle.x+paddle.w > GAME_WIDTH) paddle.x = GAME_WIDTH-paddle.w;
                
                let pCol = effects.expand.t > 0 ? '#34d399' : (effects.shrink.t > 0 ? '#ef4444' : '#38bdf8');
                ctx.fillStyle = pCol;
                ctx.fillRect(paddle.x | 0, paddle.y | 0, paddle.w | 0, paddle.h | 0);
                ctx.fillStyle = '#fff';
                ctx.fillRect((paddle.x+10) | 0, (paddle.y+3) | 0, (paddle.w-20) | 0, (paddle.h-6) | 0);

                // Bolas
                let spdMod = effects.fast.t > 0 ? 1.5 : (effects.slow.t > 0 ? 0.6 : 1);
                balls.forEach((b, i) => {
                    if(b.attached) { b.x = paddle.x + b.off; b.y = paddle.y - 12; }
                    else {
                        b.x += b.dx * spdMod; b.y += b.dy * spdMod;
                        if(b.x-b.r < 0 || b.x+b.r > GAME_WIDTH) b.dx *= -1; if(b.y-b.r < 0) b.dy *= -1;
                        if(b.y+b.r > paddle.y && b.y-b.r < paddle.y+paddle.h && b.x+b.r > paddle.x && b.x-b.r < paddle.x+paddle.w && b.dy > 0) {
                            if(effects.magnet.t > 0) { b.attached = true; b.off = b.x - paddle.x; }
                            else {
                                let hit = (b.x - (paddle.x+paddle.w/2))/(paddle.w/2);
                                b.dx = 8 * Math.sin(hit * (Math.PI/2.5)); b.dy = -8 * Math.cos(hit * (Math.PI/2.5));
                            }
                        }
                        if(b.y > GAME_HEIGHT) balls.splice(i, 1);
                        
                        bricks.forEach(row => row.forEach(br => {
                            if(br && br.hp > 0) {
                                let tx = Math.max(br.x, Math.min(b.x, br.x+br.w)), ty = Math.max(br.y, Math.min(b.y, br.y+br.h));
                                if(Math.sqrt((b.x-tx)**2 + (b.y-ty)**2) < b.r) {
                                    if(effects.fire.t <= 0) { if(Math.abs(b.x-tx) > Math.abs(b.y-ty)) b.dx *= -1; else b.dy *= -1; }
                                    br.hp -= (effects.fire.t > 0 ? 10 : 1); score += 10;
                                    if(effects.poison.t > 0) br.poisoned = true;
                                    if(br.hp <= 0 && br.p) drops.push({x:br.x+br.w/2-17, y:br.y, p:br.p});
                                }
                            }
                        }));
                    }
                    
                    // Renderizado de pelota con coordenadas enteras
                    ctx.beginPath(); ctx.arc(b.x | 0, b.y | 0, b.r, 0, Math.PI*2); ctx.fillStyle = effects.fire.t>0?'#fcd34d':'white'; ctx.fill();
                });
            }

            // Gestionar Vidas / Victoria
            if(balls.length === 0 && !isExploding) {
                isExploding = true;
                let pCol = effects.expand.t > 0 ? '#34d399' : (effects.shrink.t > 0 ? '#ef4444' : '#38bdf8');
                for(let i=0; i<40; i++) particles.push({ x:paddle.x+Math.random()*paddle.w, y:paddle.y, vx:(Math.random()-0.5)*15, vy:(Math.random()-1)*10, life:1, c:pCol, s:Math.random()*8+4 });
                setTimeout(() => {
                    lives--; updateUI(); resetPowers();
                    if(lives <= 0) showGameOver(); else setupLevel();
                }, 1500);
            } else if(activeBricks === 0 && !isExploding) {
                isPlaying = false; 
                if(level >= 100) document.getElementById('game-beaten-screen').classList.add('active');
                else { saveProg(level+1); document.getElementById('screen-victory').classList.add('active'); }
            }

            // UI
            Object.keys(effects).forEach(k => { if(effects[k].t > 0) effects[k].t--; });
            renderHUD();
            
            // OPTIMIZACIÓN DEL DOM: Solo actualiza el HTML si la puntuación ha cambiado.
            let currentScoreInt = Math.floor(score);
            if (currentScoreInt !== lastRenderedScore) {
                document.getElementById('ui-score').innerText = currentScoreInt;
                lastRenderedScore = currentScoreInt;
            }
            
            animationId = requestAnimationFrame(update);
        }

        // --- FUNCIONES DE CONTROL ---
        function updateUI() {
            let world = Math.min(Math.floor((level-1)/10)+1, 10);
            let lvlInW = ((level-1)%10)+1;
            let theme = worldThemes[world-1];
            document.getElementById('ui-world-level').innerText = `MUNDO ${world} - NIVEL ${lvlInW}`;
            document.getElementById('ui-world-level').style.color = theme.text;
            document.getElementById('ui-lives').innerText = lives;
            document.getElementById('ui-saved-info').innerText = `PROGRESO: NIVEL ${maxLvl}`;
        }

        function renderHUD() {
            const container = document.getElementById('active-powers-hud');
            container.innerHTML = '';
            Object.keys(effects).forEach(k => {
                if(effects[k].t > 0) {
                    const div = document.createElement('div'); div.className = 'power-bar-container';
                    const fill = document.createElement('div'); fill.className = 'power-bar-fill';
                    fill.style.background = effects[k].c; fill.style.transform = `scaleX(${effects[k].t/effects[k].max})`;
                    const txt = document.createElement('div'); txt.className = 'power-bar-text'; txt.innerText = effects[k].label;
                    div.append(fill, txt); container.append(div);
                }
            });
        }

        function saveProg(l) { if(l > maxLvl) { maxLvl = l; localStorage.setItem('laserPanicMax', maxLvl); } }
        function resetPowers() { Object.keys(effects).forEach(k => effects[k].t = 0); drops = []; bullets = []; }

        function showGameOver() {
            isPlaying = false; document.getElementById('ui-final-score').innerText = Math.floor(score);
            document.getElementById('save-area').style.display = score > 0 ? 'flex' : 'none';
            document.getElementById('screen-gameover').classList.add('active');
        }

        function updateRankingUI() {
            const list = document.getElementById('list-ranking');
            list.innerHTML = globalScores.length ? '' : '<p>Sé el primero en jugar</p>';
            globalScores.forEach((s, i) => {
                const li = document.createElement('li');
                if(user && s.userId === user.uid) li.className = 'current-user';
                li.innerHTML = `<span>${i+1}. ${s.name}</span> <span>${Math.floor(s.score)}</span>`;
                list.append(li);
            });
        }

        // --- EVENTOS ---
        document.getElementById('btn-play').onclick = () => { level = maxLvl; document.getElementById('screen-start').classList.remove('active'); setupLevel(); isPlaying = true; update(); };
        document.getElementById('btn-next').onclick = () => { level++; document.getElementById('screen-victory').classList.remove('active'); setupLevel(); isPlaying = true; };
        document.getElementById('btn-retry').onclick = () => { score = 0; lastRenderedScore = -1; lives = 3; document.getElementById('screen-gameover').classList.remove('active'); setupLevel(); isPlaying = true; };
        document.getElementById('btn-to-menu').onclick = () => location.reload();
        document.getElementById('btn-pause').onclick = () => { if(isPlaying && !isExploding) { isPlaying = false; document.getElementById('screen-pause').classList.add('active'); } };
        document.getElementById('btn-resume').onclick = () => { isPlaying = true; document.getElementById('screen-pause').classList.remove('active'); update(); };
        document.getElementById('btn-quit').onclick = () => location.reload();
        document.getElementById('btn-open-ranking').onclick = () => document.getElementById('screen-ranking').classList.add('active');
        document.getElementById('btn-close-ranking').onclick = () => document.getElementById('screen-ranking').classList.remove('active');
        
        document.getElementById('btn-open-levels').onclick = () => {
            const grid = document.getElementById('level-select-grid'); grid.innerHTML = '';
            for(let i=1; i<=100; i++) {
                const b = document.createElement('div'); b.className = i <= maxLvl ? 'lvl-box' : 'lvl-box locked';
                b.innerText = i; if(i <= maxLvl) b.onclick = () => { level = i; document.getElementById('screen-levels').classList.remove('active'); document.getElementById('screen-start').classList.remove('active'); setupLevel(); isPlaying = true; update(); };
                grid.append(b);
            }
            document.getElementById('screen-levels').classList.add('active');
        };
        document.getElementById('btn-close-levels').onclick = () => document.getElementById('screen-levels').classList.remove('active');

        document.getElementById('btn-submit-score').onclick = async () => {
            const alias = document.getElementById('input-alias').value.trim().toUpperCase() || "PILOTO";
            document.getElementById('btn-submit-score').disabled = true;
            const ok = await saveScoreToFirebase(alias, Math.floor(score));
            document.getElementById('save-status-msg').style.display = 'block';
            document.getElementById('save-status-msg').innerText = ok ? "¡GUARDADO!" : "ERROR DE CONEXIÓN";
        };

        // Controles
        window.onkeydown = e => { if(e.key==='ArrowLeft'||e.key==='a') paddle.dx=-12; if(e.key==='ArrowRight'||e.key==='d') paddle.dx=12; if(e.key===' '){ e.preventDefault(); launch(); } };
        window.onkeyup = () => paddle.dx = 0;
        function launch() { 
            balls.forEach(b => { if(b.attached) { b.attached = false; b.dx = (b.off-60)*0.2; b.dy = -8; } }); 
            if(effects.gun.t > 0) bullets.push({x:paddle.x+15, y:paddle.y}, {x:paddle.x+paddle.w-15, y:paddle.y});
        }
        canvas.onmousedown = (e) => { if(isPlaying) launch(); };
        canvas.ontouchstart = (e) => { e.preventDefault(); if(isPlaying) launch(); };
        canvas.onmousemove = e => { let r = canvas.getBoundingClientRect(); paddle.x = (e.clientX-r.left)*(GAME_WIDTH/r.width) - paddle.w/2; };
        canvas.ontouchmove = e => { e.preventDefault(); let r = canvas.getBoundingClientRect(); paddle.x = (e.touches[0].clientX-r.left)*(GAME_WIDTH/r.width) - paddle.w/2; };

        updateUI();
    </script>
</body>
</html>
